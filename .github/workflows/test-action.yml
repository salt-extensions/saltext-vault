---
name: Testing

on:
  workflow_call:
    inputs:
      changed-files:
        required: true
        type: string
        description: JSON string of array of all changed files. Used for optimizing PR CI runtimes.

jobs:

  Linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - {salt-version: "3006.27", python-version: "3.11", testing-container: "hashicorp/vault:1.14.8"}
          - {salt-version: "3008.2", python-version: "3.10", testing-container: "openbao/openbao:latest"}
          - {salt-version: "3008.2", python-version: "3.14", testing-container: "hashicorp/vault:latest"}

    env:
      TESTING_CONTAINER: ${{ matrix.testing-container }}

    steps:
      - name: Generate Run ID
        run: |
          RUNID="${{ runner.os }}-Py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}-${TESTING_CONTAINER//[:\/]/_}"
          echo "RUNID=${RUNID}" >> "$GITHUB_ENV"
          echo "Run ID: ${RUNID}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2  # coverage: Issue detecting commit SHA

      - name: Setup Vault
        # renovate:
        uses: eLco/setup-vault@1a8cc6f3c818a0e71b6fade4a922eeec95069edf  # v1.0.4
        with:
          vault_version: 1.15.4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Nox
        run: |
          python -m pip install --upgrade pip
          pip install "nox==$NOX_VERSION" "uv==$UV_VERSION"
        env:
          NOX_VERSION: '2026.4.10'
          UV_VERSION: '0.11.26'

      - name: Install Test Requirements
        env:
          SALT_REQUIREMENT: salt==${{ matrix.salt-version }}
        run: |
          nox --force-color -e tests-3 --install-only

      - name: Test
        env:
          # Assume this list is not too long for an env var (around 2**16 bytes on Linux, half that on Windows)
          CHANGED_FILES: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'test:full') && inputs.changed-files || '' }}
          SALT_REQUIREMENT: salt==${{ matrix.salt-version }}
          SKIP_REQUIREMENTS_INSTALL: true
        run: >-
          nox --force-color -e tests-3 -- -vv --instafail
          ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'test:full') && '--changed-files --allow-empty-runs' || '' }}
          tests/

      - name: Create CodeCov Flags
        if: always()
        id: codecov-flags
        run: |
          echo "flags=$(python -c "import sys; print('{},{},salt_{}'.format('${{ runner.os }}'.replace('-latest', ''), 'py{}{}'.format(*sys.version_info), '_'.join(str(v) for v in '${{ matrix.salt-version }}'.replace('==', '_').split('.'))))")" >> "$GITHUB_OUTPUT"

      - name: Upload Project Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: artifacts/coverage-project.xml
          disable_search: true
          fail_ci_if_error: false
          flags: ${{ steps.codecov-flags.outputs.flags }},project
          name: ${{ env.RUNID }}-project
          use_oidc: true
          version: v11.2.8

      - name: Upload Tests Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: artifacts/coverage-tests.xml
          disable_search: true
          fail_ci_if_error: false
          flags: ${{ steps.codecov-flags.outputs.flags }},tests
          name: ${{ env.RUNID }}-tests
          use_oidc: true
          version: v11.2.8

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: runtests-${{ env.RUNID }}.log
          path: artifacts/runtests-*.log

      - name: Upload Exit Status
        if: always() && matrix.salt-version != 'master' && !endsWith(matrix.salt-version, '.x')
        uses: ./.github/actions/upload-exitstatus
        with:
          name: ${{ env.RUNID }}

  Windows:
    runs-on: windows-2025
    timeout-minutes: 40

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - {salt-version: "3006.27", python-version: "3.11"}
          - {salt-version: "3008.2", python-version: "3.14"}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Nox
        run: |
          python -m pip install --upgrade pip
          pip install "nox==$env:NOX_VERSION" "uv==$env:UV_VERSION"
        env:
          NOX_VERSION: '2026.4.10'
          UV_VERSION: '0.11.26'

      - name: Install Test Requirements
        shell: bash
        env:
          SALT_REQUIREMENT: salt==${{ matrix.salt-version }}
          # EXTRA_REQUIREMENTS_INSTALL: Cython
        run: |
          export PATH="/C/Program Files (x86)/Windows Kits/10/bin/10.0.18362.0/x64;$PATH"
          nox --force-color -e tests-3 --install-only

      - name: Test
        shell: bash
        env:
          CHANGED_FILES: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'test:full') && inputs.changed-files || '' }}
          SALT_REQUIREMENT: salt==${{ matrix.salt-version }}
          SKIP_REQUIREMENTS_INSTALL: true
        run: >-
          export PATH="/C/Program Files (x86)/Windows Kits/10/bin/10.0.18362.0/x64;$PATH";
          nox --force-color -e tests-3 -- -vv --instafail
          ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'test:full') && '--changed-files --allow-empty-runs' || '' }}
          tests/

      - name: Create CodeCov Flags
        if: always()
        id: codecov-flags
        run: |
          echo "flags=$(python -c "import sys; print('{},{},salt_{}'.format('${{ runner.os }}'.replace('-latest', ''), 'py{}{}'.format(*sys.version_info), '_'.join(str(v) for v in '${{ matrix.salt-version }}'.replace('==', '_').split('.'))))")" >> "$GITHUB_OUTPUT"

      - name: Upload Project Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: artifacts/coverage-project.xml
          disable_search: true
          fail_ci_if_error: false
          flags: ${{ steps.codecov-flags.outputs.flags }},project
          name: ${{ runner.os }}-Py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}-project
          use_oidc: true
          version: v11.2.8

      - name: Upload Tests Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: artifacts/coverage-tests.xml
          disable_search: true
          fail_ci_if_error: false
          flags: ${{ steps.codecov-flags.outputs.flags }},tests
          name: ${{ runner.os }}-Py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}-tests
          use_oidc: true
          version: v11.2.8

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: runtests-${{ runner.os }}-py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}.log
          path: artifacts/runtests-*.log

      - name: Upload Exit Status
        if: always()
        uses: ./.github/actions/upload-exitstatus
        with:
          name: ${{ github.job }}-Py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}

  macOS:
    runs-on: macos-14
    timeout-minutes: 40

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - {salt-version: "3006.27", python-version: "3.11"}
          - {salt-version: "3008.2", python-version: "3.14"}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Nox
        run: |
          python -m pip install --upgrade pip
          pip install "nox==$NOX_VERSION" "uv==$UV_VERSION"
        env:
          NOX_VERSION: '2026.4.10'
          UV_VERSION: '0.11.26'

      - name: Install Test Requirements
        env:
          SALT_REQUIREMENT: salt==${{ matrix.salt-version }}
        run: |
          nox --force-color -e tests-3 --install-only

      - name: Test
        env:
          CHANGED_FILES: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'test:full') && inputs.changed-files || '' }}
          SALT_REQUIREMENT: salt==${{ matrix.salt-version }}
          SKIP_REQUIREMENTS_INSTALL: true
        run: >-
          nox --force-color -e tests-3 -- -vv --instafail
          ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'test:full') && '--changed-files --allow-empty-runs' || '' }}
          tests/

      - name: Create CodeCov Flags
        if: always()
        id: codecov-flags
        run: |
          echo "flags=$(python -c "import sys; print('{},{},salt_{}'.format('${{ runner.os }}'.replace('-latest', ''), 'py{}{}'.format(*sys.version_info), '_'.join(str(v) for v in '${{ matrix.salt-version }}'.replace('==', '_').split('.'))))")" >> "$GITHUB_OUTPUT"

      - name: Upload Project Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: artifacts/coverage-project.xml
          disable_search: true
          fail_ci_if_error: false
          flags: ${{ steps.codecov-flags.outputs.flags }},project
          name: ${{ runner.os }}-Py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}-project
          use_oidc: true
          version: v11.2.8

      - name: Upload Tests Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: artifacts/coverage-tests.xml
          disable_search: true
          fail_ci_if_error: false
          flags: ${{ steps.codecov-flags.outputs.flags }},tests
          name: ${{ runner.os }}-Py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}-tests
          use_oidc: true
          version: v11.2.8

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: runtests-${{ runner.os }}-py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}.log
          path: artifacts/runtests-*.log

      - name: Upload Exit Status
        if: always()
        uses: ./.github/actions/upload-exitstatus
        with:
          name: ${{ github.job }}-Py${{ matrix.python-version }}-Salt${{ matrix.salt-version }}
